
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #008080; }
  .browser { font-family: "Arial", sans-serif; background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; max-width: 700px; margin: 0 auto; image-rendering: pixelated; }
  .title-bar { background: #000080; color: white; padding: 3px 6px; display: flex; align-items: center; justify-content: space-between; font-size: 12px; font-weight: bold; }
  .title-bar-btns { display: flex; gap: 2px; }
  .tb-btn { width: 14px; height: 14px; border: 1px solid; border-color: #ffffff #808080 #808080 #ffffff; background: #c0c0c0; color: #000; font-size: 9px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
  .menubar { background: #c0c0c0; padding: 2px 4px; display: flex; gap: 1px; border-bottom: 1px solid #808080; }
  .menu-item { font-size: 12px; padding: 2px 8px; cursor: pointer; color: #000; }
  .menu-item:hover { background: #000080; color: #fff; }
  .toolbar { background: #c0c0c0; padding: 4px; display: flex; align-items: center; gap: 3px; border-bottom: 2px solid #808080; flex-wrap: wrap; }
  .btn { min-width: 44px; height: 34px; background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 9px; gap: 1px; padding: 2px 4px; color: #000; user-select: none; }
  .btn:active { border-color: #808080 #ffffff #ffffff #808080; }
  .btn.disabled { opacity: 0.4; cursor: default; }
  .btn-icon { font-size: 14px; line-height: 1; }
  .sep { width: 2px; height: 32px; background: #808080; border-right: 1px solid #fff; margin: 0 2px; }
  .ns-logo { width: 36px; height: 36px; background: #000080; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; display: flex; align-items: center; justify-content: center; margin-left: auto; overflow: hidden; }
  .ns-logo-text { font-size: 20px; color: #fff; font-weight: 900; font-family: "Times New Roman", serif; }
  .ns-logo.loading .ns-logo-text { animation: spin 0.3s steps(4) infinite; }

  .addr-bar { background: #c0c0c0; padding: 3px 4px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid #808080; }
  .addr-label { font-size: 12px; font-weight: bold; white-space: nowrap; }
  .addr-input { flex: 1; height: 20px; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; background: #ffffff; font-size: 12px; font-family: "Courier New", monospace; padding: 0 4px; color: #000; outline: none; }
  .go-btn { height: 20px; padding: 0 8px; background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; font-size: 11px; cursor: pointer; white-space: nowrap; }
  .go-btn:active { border-color: #808080 #ffffff #ffffff #808080; }
  .content { background: #c0c0c0; min-height: 320px; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; margin: 2px; }
  .page { background: #ffffff; min-height: 316px; overflow-y: auto; max-height: 316px; }
  .status-bar { background: #c0c0c0; border-top: 2px solid; border-color: #808080 #ffffff #ffffff #808080; padding: 2px 6px; display: flex; align-items: center; gap: 8px; }
  .status-text { font-size: 11px; flex: 1; font-family: "Arial", sans-serif; }
  .progress-box { width: 140px; height: 14px; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; background: #c0c0c0; overflow: hidden; }
  .progress-fill { height: 100%; background: #000080; transition: width 0.2s; width: 0%; }
  .zone { font-size: 11px; padding: 0 8px; border-left: 1px solid #808080; }
  .netsite { padding: 8px 12px; font-family: "Times New Roman", serif; color: #000; }
  .netsite h1 { font-size: 22px; color: #000080; border-bottom: 3px double #000080; margin-bottom: 6px; padding-bottom: 4px; }
  .netsite h2 { font-size: 17px; color: #800000; margin: 10px 0 4px; }
  .netsite p { font-size: 13px; line-height: 1.5; margin-bottom: 6px; }
  .netsite a { color: #0000cc; text-decoration: underline; cursor: pointer; }
  .netsite a:visited { color: #800080; }
  .netsite a:hover { color: #ff0000; }
  .netsite hr { border: none; border-top: 2px solid #808080; margin: 8px 0; }
  .netsite ul { padding-left: 18px; font-size: 13px; }
  .netsite li { margin-bottom: 3px; }
  .netsite table { border-collapse: collapse; font-size: 12px; width: 100%; margin: 6px 0; }
  .netsite td, .netsite th { border: 1px solid #808080; padding: 3px 6px; }
  .netsite th { background: #c0c0c0; }
  .netsite .marquee-wrap { overflow: hidden; background: #ffff00; border: 1px solid #000; padding: 2px; margin: 6px 0; }
  .netsite .marquee { display: inline-block; white-space: nowrap; animation: marquee 10s linear infinite; font-size: 12px; font-weight: bold; color: #ff0000; font-family: "Courier New", monospace; }
  @keyframes marquee { 0%{transform:translateX(300px)} 100%{transform:translateX(-100%)} }
  .netsite .blink { animation: blink 0.8s step-end infinite; }
  @keyframes blink { 50%{opacity:0} }
  .netsite .hit-counter { display: inline-block; background: #000; color: #00ff00; font-family: "Courier New", monospace; font-size: 13px; padding: 2px 6px; border: 1px solid #00ff00; letter-spacing: 2px; }
  .netsite .under-construction { background: repeating-linear-gradient(45deg, #ffff00, #ffff00 10px, #000 10px, #000 20px); padding: 4px; text-align: center; margin: 8px 0; }
  .netsite .uc-inner { background: #ffff00; font-weight: bold; font-size: 12px; padding: 2px; }
  .netsite .guestbook { background: #ffffcc; border: 1px solid #cccc00; padding: 6px; font-size: 12px; margin: 6px 0; }
  .netsite .webring { text-align: center; background: #eee; border: 1px dashed #808080; padding: 4px; font-size: 11px; margin-top: 8px; }

  .error-page { padding: 20px; text-align: center; }

  .error-page p { font-size: 14px; font-family: "Times New Roman", serif; }
  .blank-page { background: #c0c0c0; min-height: 316px; }
</style>

  <div class="status-bar">

    <div class="progress-box"><div class="progress-fill" id="progress-fill"></div></div>
    <span class="zone">Internet zone</span>

</div>

let history = ["http://www.netscape.com/welcome/"];
let histIdx = 0;
let loading = false;

function go(url) {
  document.getElementById("url-input").value = url;
  navigate();
}

function navigate() {
  const raw = document.getElementById("url-input").value.trim();
  let url = raw;
  if (!url.startsWith("http") && !url.startsWith("about:")) {
    url = "http://www." + url + "/";
    document.getElementById("url-input").value = url;
  }
  if (histIdx < history.length - 1) history = history.slice(0, histIdx + 1);
  history.push(url);
  histIdx = history.length - 1;
  loadPage(url);
  updateNavBtns();
}

function loadPage(url) {
  loading = true;
  document.getElementById("btn-stop").classList.remove("disabled");
  document.getElementById("ns-logo").classList.add("loading");
  document.getElementById("status-text").textContent = "Connecting to " + url.split("/")[2] + "...";
  let p = 0;
  const pf = document.getElementById("progress-fill");
  pf.style.width = "5%";
  const iv = setInterval(() => {
    p += Math.random() * 20 + 5;
    if (p > 85) { clearInterval(iv); }
    pf.style.width = Math.min(p, 90) + "%";
  }, 120);
  setTimeout(() => {
    clearInterval(iv);
    pf.style.width = "100%";
    const page = pages[url] || {
      title: "404 Not Found - Netscape Navigator 3.0",
      html: `<div class="error-page"><h1>404 Not Found</h1><hr><p>The server could not find the requested document.<br><br>
      The URL you requested was:<br><b style="font-family:monospace;font-size:13px;">${url}</b><br><br>
      Please check the URL and try again. Make sure you are connected to the internet.</p><hr><p style="font-size:11px;">Netscape Navigator 3.0</p></div>`
    };
    document.getElementById("page-content").innerHTML = page.html;
    document.getElementById("page-title").textContent = page.title;
    document.getElementById("url-input").value = url;
    document.getElementById("status-text").textContent = "Document: Done";
    document.getElementById("ns-logo").classList.remove("loading");
    document.getElementById("btn-stop").classList.add("disabled");
    loading = false;
    setTimeout(() => { pf.style.width = "0%"; }, 400);
  }, 900 + Math.random() * 600);
}

function navBack() {
  if (histIdx > 0) { histIdx--; loadPage(history[histIdx]); document.getElementById("url-input").value = history[histIdx]; updateNavBtns(); }
}
function navFwd() {
  if (histIdx < history.length - 1) { histIdx++; loadPage(history[histIdx]); document.getElementById("url-input").value = history[histIdx]; updateNavBtns(); }
}
function reload() { loadPage(history[histIdx]); }
function stopLoad() { document.getElementById("ns-logo").classList.remove("loading"); document.getElementById("status-text").textContent = "Transfer interrupted!"; document.getElementById("btn-stop").classList.add("disabled"); loading = false; }
function goHome() { go("http://www.netscape.com/welcome/"); }
function openSearch() { go("http://www.altavista.com/"); }
function updateNavBtns() {
  document.getElementById("btn-back").classList.toggle("disabled", histIdx <= 0);
  document.getElementById("btn-fwd").classList.toggle("disabled", histIdx >= history.length - 1);
}

loadPage("http://www.netscape.com/welcome/");
</script>
